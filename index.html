<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratorio Clínico - Sistema Administrativo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif; 
      background: #eef2f7; 
      min-height: 100vh; 
      padding: 20px; 
    }
    .container { max-width: 1000px; margin: 0 auto; }
    .panel { 
      background: white; 
      border-radius: 12px; 
      box-shadow: 0 8px 30px rgba(0,0,0,0.08); 
      overflow: hidden; 
      border: 1px solid #dce4ec;
    }
    .panel-header { 
      background: #1a5f7a; 
      color: white; 
      padding: 20px 24px; 
      text-align: center; 
      border-bottom: 3px solid #ffc107;
      position: relative;
    }
    .panel-header h1 { font-size: 1.8rem; font-weight: 600; }
    .panel-header p { font-size: 0.9rem; margin-top: 6px; opacity: 0.9; }
    .btn-cambiar-rol {
      position: absolute;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 2px solid rgba(255,255,255,0.5);
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }
    .btn-cambiar-rol:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
      border-color: #ffc107;
    }
    .panel-content { padding: 28px; }
    .seccion { margin-bottom: 32px; }
    .seccion-titulo { 
      font-size: 1.2rem; 
      color: #1a5f7a; 
      margin-bottom: 16px; 
      border-left: 4px solid #2c9cd4;
      padding-left: 12px;
      font-weight: 600;
    }
    .mensaje-vacio { 
      text-align: center; 
      color: #7f8c8d; 
      padding: 32px; 
      background: #f9fafb;
      border-radius: 10px;
    }
    .loader {
      border: 4px solid #e0e7ed;
      border-top: 4px solid #1a5f7a;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      animation: spin 0.9s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .cargando-mensaje {
      text-align: center;
      color: #1a5f7a;
      padding: 24px;
      font-weight: 500;
      background: #f0f6fa;
      border-radius: 12px;
    }
    .resultado-item {
      background: #f9fdf9;
      border-left: 4px solid #2c6e49;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .admin-botones {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .btn-primario {
      background: #1a5f7a;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primario:hover { background: #104a60; }
    .btn-secundario {
      background: #eef2f7;
      color: #1f5e7a;
      border: 1px solid #cbdde9;
      padding: 10px 18px;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-secundario:hover { background: #e2eaf1; }
    .btn-imprimir {
      background: #764ba2;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .btn-whatsapp {
      background: #25D366;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .aviso-cambio {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #2c6e49;
      color: white;
      padding: 12px 20px;
      border-radius: 40px;
      animation: slideIn 0.3s ease;
      z-index: 1000;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #1a5f7a;
      color: white;
      padding: 12px;
      text-align: left;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-contenido {
      background: white;
      border-radius: 20px;
      width: 480px;
      max-width: 92%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      padding: 20px;
      border-bottom: 1px solid #ddd;
    }
    .modal-body {
      padding: 20px;
    }
    .modal-footer {
      padding: 15px 20px;
      border-top: 1px solid #ddd;
      display: flex;
      gap: 12px;
    }
    .campo {
      margin-bottom: 15px;
    }
    .campo label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .campo input, .campo select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    .error-input {
      border: 2px solid #c0392b !important;
      background: #ffe8e5 !important;
    }
    .checkbox-group {
      background: #f9f9f9;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      max-height: 130px;
      overflow-y: auto;
    }
    /* CORREGIDO: Checkbox horizontal con texto a la derecha */
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .checkbox-item input {
      width: 18px;
      height: 18px;
      margin: 0;
      cursor: pointer;
      flex-shrink: 0;
    }
    .checkbox-item label {
      margin: 0;
      cursor: pointer;
      font-weight: normal;
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <div class="panel-header">
        <button id="btnCambiarARolBioanalista" class="btn-cambiar-rol">🔬 Cambiar a Bioanalista</button>
        <h1>🏥 Laboratorio Clínico</h1>
        <p>SISTEMA ADMINISTRATIVO - Gestión de Órdenes</p>
      </div>
      <div class="panel-content">
        <div id="cargando" class="cargando-mensaje">
          <div class="loader"></div>
          Cargando...
        </div>
        
        <div id="contenidoPrincipal" style="display: none;">
          <div class="seccion">
            <div class="seccion-titulo">📋 Opciones Generales</div>
            <div id="admin_formulario">
              <div class="admin-botones">
                <button id="botonAbrirModal" class="btn-primario">+ Registrar Orden de Examen</button>
              </div>
              
              <div style="padding: 18px; border: 1px solid #dce4ec; border-radius: 16px; background: #f8fbff; margin-top: 16px;">
                <div style="font-weight: 600; color: #1a5f7a; margin-bottom: 12px;">🔍 Filtrar estudios por fecha</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px;">
                  <label style="display: flex; flex-direction: column; gap: 6px;">
                    Fecha
                    <input id="filtro_fecha" type="date" style="padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1;">
                  </label>
                  <label style="display: flex; flex-direction: column; gap: 6px;">
                    Estudio
                    <select id="filtro_tipo_estudio" style="padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1;">
                      <option value="">-- Seleccione un estudio --</option>
                    </select>
                  </label>
                </div>
                <button id="botonFiltrarEstudios" class="btn-secundario">🔎 Buscar cantidad</button>
                <div id="resultadoFiltroEstudios" style="margin-top: 18px;"></div>
              </div>

              <div style="padding: 18px; border: 1px solid #dce4ec; border-radius: 16px; background: #f8fbff; margin-top: 16px;">
                <div style="font-weight: 600; color: #1a5f7a; margin-bottom: 12px;">📊 Porcentaje de estudio sobre el total</div>
                <div style="margin-bottom: 14px;">
                  <label style="display: flex; flex-direction: column; gap: 6px;">
                    Estudio a analizar
                    <select id="porcentaje_tipo_estudio" style="padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1;">
                      <option value="">-- Seleccione un estudio --</option>
                    </select>
                  </label>
                </div>
                <button id="botonCalcularPorcentaje" class="btn-secundario" style="background: #764ba2; color: white;">📊 Calcular porcentaje</button>
                <div id="resultadoPorcentajeEstudios" style="margin-top: 18px;"></div>
              </div>
            </div>
          </div>
          
          <div class="seccion">
            <div class="seccion-titulo">🖨️ Resultados Listos para Impresión</div>
            <div id="admin_finalizados"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL REGISTRAR EXAMEN -->
  <div id="modalExamen" class="modal">
    <div class="modal-contenido">
      <div class="modal-header" style="background: #1a5f7a; color: white; border-radius: 20px 20px 0 0;">
        <h3>📝 Registrar Orden Médica</h3>
      </div>
      <div class="modal-body" id="modal_contenido"></div>
      <div class="modal-footer">
        <button id="modal_btnCancelar" class="btn-secundario" style="flex:1;">Cancelar</button>
        <button id="modal_btnAceptar" class="btn-primario" style="flex:1;">Registrar Orden</button>
      </div>
    </div>
  </div>

  <script type="module">
    import Cl_vAdmin from "./dist/views/Cl_vAdmin.js";
    import Cl_vExamen from "./dist/views/Cl_vExamen.js";
    import Cl_cExamen from "./dist/controllers/Cl_cExamen.js";
    import Cl_cLaboratorioAdmin from "./dist/controllers/Cl_cLaboratorioAdmin.js";
    import Cl_sEstudio from "./dist/services/Cl_sEstudio.js";
    import Cl_mEstudio from "./dist/models/Cl_mEstudio.js";
    
    function mostrarAviso(mensaje, esError = false) {
      const aviso = document.createElement('div');
      aviso.className = 'aviso-cambio';
      aviso.textContent = mensaje;
      aviso.style.background = esError ? '#c0392b' : '#2c6e49';
      document.body.appendChild(aviso);
      setTimeout(() => aviso.remove(), 3000);
    }

    function cambiarABioanalista() {
      fetch('index_bioanalista.html', { method: 'HEAD' })
        .then(response => {
          if (response.ok) {
            mostrarAviso("🔬 Cambiando al panel de Bioanalista...");
            setTimeout(() => window.location.href = 'index_bioanalista.html', 500);
          } else {
            mostrarAviso("⚠️ El módulo de Bioanalista no está disponible", true);
          }
        })
        .catch(() => mostrarAviso("❌ Error al cambiar de módulo", true));
    }
    
    async function iniciarAplicacion() {
      try {
        await Cl_sEstudio.cargarCatálogo();
        
        document.getElementById("cargando").style.display = "none";
        document.getElementById("contenidoPrincipal").style.display = "block";
        
        const vAdmin = new Cl_vAdmin();
        const vExamen = new Cl_vExamen();
        const cExamen = new Cl_cExamen(vExamen);
        const cLaboratorioAdmin = new Cl_cLaboratorioAdmin(vAdmin, cExamen);
        
        const btnCambioRol = document.getElementById("btnCambiarARolBioanalista");
        if (btnCambioRol) {
          const nuevoBoton = btnCambioRol.cloneNode(true);
          btnCambioRol.parentNode.replaceChild(nuevoBoton, btnCambioRol);
          nuevoBoton.addEventListener("click", cambiarABioanalista);
        }
      } catch (error) {
        console.error(error);
        document.getElementById("cargando").innerHTML = '<p style="color:red;">Error al cargar. <button onclick="location.reload()">Reintentar</button></p>';
      }
    }
    
    iniciarAplicacion();
  </script>
</body>
</html>
